function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function loadTrades(){
  try{
    const SK='tullpro_v3';
    let state={trades:[],projectName:'West Bundle — Thornbury PS'};
    const existing=localStorage.getItem(SK);
    if(existing){ const p=JSON.parse(existing); state={...state,...p}; }
    state.projectName='West Bundle — Thornbury PS';
    state.trades=TRADES.map(t=>({
      id:uid(), name:t.n, company:'', start:t.s, end:t.e,
      pri:t.p, status:t.st, notes:'', deps:[]
    }));
    localStorage.setItem(SK,JSON.stringify(state));
    document.getElementById('status').style.display='block';
    document.getElementById('cnt').textContent='✅ '+TRADES.length+' trades loaded!';
    setTimeout(()=>{ window.location='https://tull-pro.github.io/TullPro/'; },1500);
  }catch(e){
    alert('Error: '+e.message);
  }
}
