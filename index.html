<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A1D21">
<title>Tull Pro – Site Programme</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#1A1D21;--surface:#252A31;--surface2:#2E3338;--border:#363C45;
    --amber:#F5A623;--red:#E84B3A;--green:#4CAF7D;--blue:#4A9EFF;
    --white:#F0F2F5;--dim:#8B95A1;--text:#C8D0DA;
  }
  html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Inter',system-ui,sans-serif;overflow:hidden;}
  #app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

  /* ── Header ── */
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
  .logo{font-size:18px;font-weight:900;letter-spacing:-0.5px;color:var(--white);}
  .logo span{color:var(--amber);}
  .header-actions{display:flex;gap:8px;}
  .icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--white);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}

  /* ── Tabs ── */
  .tabs{display:flex;padding:10px 16px 0;gap:4px;flex-shrink:0;}
  .tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;border-bottom:2px solid transparent;color:var(--dim);cursor:pointer;transition:all .2s;}
  .tab.active{color:var(--amber);border-color:var(--amber);}

  /* ── Scrollable body ── */
  .body{flex:1;overflow-y:auto;padding:12px 16px 80px;}

  /* ── Status bar ── */
  .status-bar{display:flex;gap:8px;margin-bottom:12px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
  .stat-n{font-size:22px;font-weight:900;line-height:1;}
  .stat-l{font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--dim);margin-top:3px;}
  .stat-n.green{color:var(--green);}
  .stat-n.amber{color:var(--amber);}
  .stat-n.red{color:var(--red);}

  /* ── Trade card ── */
  .trade-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden;}
  .trade-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .trade-card.high::before{background:var(--red);}
  .trade-card.medium::before{background:var(--amber);}
  .trade-card.low::before{background:var(--green);}
  .trade-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .trade-name{font-size:14px;font-weight:800;letter-spacing:-.2px;}
  .trade-badges{display:flex;gap:5px;align-items:center;}
  .badge{font-size:9px;font-weight:800;letter-spacing:.6px;padding:2px 7px;border-radius:4px;}
  .badge-status-onsite{background:rgba(76,175,125,.15);color:var(--green);border:1px solid rgba(76,175,125,.3);}
  .badge-status-upcoming{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.25);}
  .badge-pri-high{background:rgba(232,75,58,.15);color:var(--red);border:1px solid rgba(232,75,58,.3);}
  .badge-pri-medium{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.25);}
  .badge-pri-low{background:rgba(76,175,125,.15);color:var(--green);border:1px solid rgba(76,175,125,.3);}
  .trade-meta{font-size:11px;color:var(--dim);display:flex;gap:10px;flex-wrap:wrap;}
  .trade-actions{display:flex;gap:6px;margin-top:8px;}
  .mini-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);cursor:pointer;}
  .mini-btn.danger{color:var(--red);border-color:rgba(232,75,58,.3);}

  /* ── Gantt chart ── */
  .gantt-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--surface);}
  .gantt-header{display:flex;padding:8px 0 8px 120px;gap:0;position:sticky;top:0;background:var(--surface);z-index:1;border-bottom:1px solid var(--border);}
  .gantt-day{font-size:9px;font-weight:700;color:var(--dim);text-align:center;flex:1;min-width:28px;}
  .gantt-day.today{color:var(--amber);}
  .gantt-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.04);min-height:36px;}
  .gantt-row:last-child{border-bottom:none;}
  .gantt-label{width:120px;flex-shrink:0;padding:4px 10px;font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gantt-grid{flex:1;display:flex;position:relative;min-height:36px;}
  .gantt-cell{flex:1;min-width:28px;border-left:1px solid rgba(255,255,255,.04);}
  .gantt-cell.today-col{background:rgba(245,166,35,.06);}
  .gantt-bar-wrap{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;}
  .gantt-bar{position:absolute;height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:800;letter-spacing:.3px;white-space:nowrap;overflow:hidden;}
  .gantt-bar.high{background:rgba(232,75,58,.8);color:#fff;}
  .gantt-bar.medium{background:rgba(245,166,35,.8);color:#111;}
  .gantt-bar.low{background:rgba(76,175,125,.8);color:#fff;}
  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:2;opacity:.7;}

  /* ── Add form ── */
  .add-form{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
  .form-title{font-size:13px;font-weight:800;margin-bottom:12px;color:var(--white);}
  .form-row{margin-bottom:10px;}
  .form-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-bottom:4px;}
  .form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:13px;padding:9px 12px;outline:none;}
  .form-input:focus{border-color:var(--amber);}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .seg{display:flex;gap:4px;}
  .seg-opt{flex:1;padding:7px 4px;text-align:center;font-size:10px;font-weight:800;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--dim);cursor:pointer;transition:all .15s;}
  .seg-opt.sel-high{background:rgba(232,75,58,.2);color:var(--red);border-color:var(--red);}
  .seg-opt.sel-medium{background:rgba(245,166,35,.2);color:var(--amber);border-color:var(--amber);}
  .seg-opt.sel-low{background:rgba(76,175,125,.2);color:var(--green);border-color:var(--green);}
  .seg-opt.sel-onsite{background:rgba(76,175,125,.2);color:var(--green);border-color:var(--green);}
  .seg-opt.sel-upcoming{background:rgba(245,166,35,.15);color:var(--amber);border-color:var(--amber);}
  .btn-row{display:flex;gap:8px;margin-top:12px;}
  .btn{flex:1;padding:11px;border-radius:9px;border:none;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.3px;}
  .btn-primary{background:var(--amber);color:#111;}
  .btn-ghost{background:var(--surface2);color:var(--dim);}

  /* ── FAB ── */
  .fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--amber);border:none;color:#111;font-size:24px;font-weight:400;cursor:pointer;box-shadow:0 4px 20px rgba(245,166,35,.4);z-index:10;display:flex;align-items:center;justify-content:center;}

  /* ── Empty ── */
  .empty{text-align:center;padding:48px 24px;color:var(--dim);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-t{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;}
  .empty-s{font-size:12px;line-height:1.6;}

  /* ── Modal ── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:20;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:15px;font-weight:900;margin-bottom:16px;}
  .hidden{display:none!important;}

  /* ── Notes ── */
  .notes-area{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:13px;padding:9px 12px;min-height:80px;resize:none;outline:none;font-family:inherit;}
  .notes-area:focus{border-color:var(--amber);}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">TULL<span>PRO</span></div>
    <div class="header-actions">
      <div class="icon-btn" onclick="showClearConfirm()" title="Clear all data">🗑</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-list" onclick="switchTab('list')">TRADES LIST</div>
    <div class="tab" id="tab-gantt" onclick="switchTab('gantt')">PROGRAMME</div>
  </div>
  <div class="body" id="main-body">
    <!-- content injected by JS -->
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()">＋</button>

<!-- Add/Edit Modal -->
<div class="modal-bg hidden" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Trade</div>
    <div class="form-row">
      <div class="form-label">TRADE NAME</div>
      <input class="form-input" id="f-name" placeholder="e.g. Concrete, Electrical…" autocomplete="off">
    </div>
    <div class="form-row">
      <div class="form-label">COMPANY / SUBCONTRACTOR</div>
      <input class="form-input" id="f-company" placeholder="Optional" autocomplete="off">
    </div>
    <div class="form-row-2">
      <div>
        <div class="form-label">START DATE</div>
        <input class="form-input" id="f-start" type="date">
      </div>
      <div>
        <div class="form-label">END DATE</div>
        <input class="form-input" id="f-end" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">PRIORITY</div>
      <div class="seg" id="seg-pri">
        <div class="seg-opt" data-val="high" onclick="selSeg('pri','high')">HIGH</div>
        <div class="seg-opt" data-val="medium" onclick="selSeg('pri','medium')">MED</div>
        <div class="seg-opt" data-val="low" onclick="selSeg('pri','low')">LOW</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">STATUS</div>
      <div class="seg" id="seg-status">
        <div class="seg-opt" data-val="onsite" onclick="selSeg('status','onsite')">ON SITE</div>
        <div class="seg-opt" data-val="upcoming" onclick="selSeg('status','upcoming')">UPCOMING</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">NOTES</div>
      <textarea class="notes-area" id="f-notes" placeholder="Any notes about this trade…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTrade()">Save Trade</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-bg hidden" id="confirm-bg">
  <div class="modal">
    <div class="modal-title" id="confirm-title">Are you sure?</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:20px;" id="confirm-msg"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn" style="background:var(--red);color:#fff;" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let trades = [];
let editId = null;
let currentTab = 'list';
let formSel = { pri: 'medium', status: 'upcoming' };

const STORAGE_KEY = 'tullpro_trades_v2';

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trades)); } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) trades = JSON.parse(d);
  } catch(e){ trades = []; }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── Dates ──────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return d + '/' + m + '/' + y.slice(2);
}
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

// ── Render ─────────────────────────────────────────────
function render() {
  if (currentTab === 'list') renderList();
  else renderGantt();
}

function renderList() {
  const body = document.getElementById('main-body');
  const today = todayStr();
  const onsite = trades.filter(t => t.status === 'onsite');
  const upcoming = trades.filter(t => t.status === 'upcoming');

  let html = `<div class="status-bar">
    <div class="stat"><div class="stat-n green">${onsite.length}</div><div class="stat-l">ON SITE</div></div>
    <div class="stat"><div class="stat-n amber">${upcoming.length}</div><div class="stat-l">UPCOMING</div></div>
    <div class="stat"><div class="stat-n ${trades.filter(t=>t.pri==='high').length>0?'red':'dim'}">${trades.filter(t=>t.pri==='high').length}</div><div class="stat-l">HIGH PRI</div></div>
  </div>`;

  if (trades.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">🏗️</div>
      <div class="empty-t">No trades yet</div>
      <div class="empty-s">Tap the <strong style="color:var(--amber)">＋</strong> button to add your first trade to the programme.</div>
    </div>`;
  } else {
    // Sort: high first, then onsite before upcoming
    const sorted = [...trades].sort((a,b) => {
      const pOrd = {high:0,medium:1,low:2};
      const sOrd = {onsite:0,upcoming:1};
      return sOrd[a.status]-sOrd[b.status] || pOrd[a.pri]-pOrd[b.pri];
    });
    sorted.forEach(t => {
      html += `<div class="trade-card ${t.pri}">
        <div class="trade-top">
          <div class="trade-name">${escHtml(t.name)}</div>
          <div class="trade-badges">
            <span class="badge badge-pri-${t.pri}">${t.pri.toUpperCase()}</span>
            <span class="badge badge-status-${t.status}">${t.status==='onsite'?'ON SITE':'UPCOMING'}</span>
          </div>
        </div>
        <div class="trade-meta">
          ${t.company?`<span>🏢 ${escHtml(t.company)}</span>`:''}
          ${t.start?`<span>📅 ${fmtDate(t.start)} → ${fmtDate(t.end)}</span>`:''}
          ${t.notes?`<span>📝 ${escHtml(t.notes.substring(0,40))}${t.notes.length>40?'…':''}</span>`:''}
        </div>
        <div class="trade-actions">
          <button class="mini-btn" onclick="openEditModal('${t.id}')">✏️ Edit</button>
          <button class="mini-btn" onclick="toggleStatus('${t.id}')">${t.status==='onsite'?'→ Upcoming':'→ On Site'}</button>
          <button class="mini-btn danger" onclick="confirmDelete('${t.id}')">🗑 Remove</button>
        </div>
      </div>`;
    });
  }
  body.innerHTML = html;
}

function renderGantt() {
  const body = document.getElementById('main-body');
  if (trades.length === 0) {
    body.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-t">No trades to display</div><div class="empty-s">Add trades with start and end dates to see them on the programme chart.</div></div>`;
    return;
  }

  const withDates = trades.filter(t => t.start && t.end);
  if (withDates.length === 0) {
    body.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-t">No dates set</div><div class="empty-s">Edit your trades and add start &amp; end dates to see the Gantt chart.</div></div>`;
    return;
  }

  const today = todayStr();
  // Find range
  let minDate = withDates.reduce((a,t) => t.start < a ? t.start : a, withDates[0].start);
  let maxDate = withDates.reduce((a,t) => t.end > a ? t.end : a, withDates[0].end);
  // Pad by 2 days each side
  const minD = new Date(minDate); minD.setDate(minD.getDate()-2);
  const maxD = new Date(maxDate); maxD.setDate(maxD.getDate()+2);
  const totalDays = daysBetween(minD.toISOString().slice(0,10), maxD.toISOString().slice(0,10)) + 1;

  // Build day headers
  const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let dayHeaders = '';
  const dayDates = [];
  for (let i=0;i<totalDays;i++) {
    const d = new Date(minD); d.setDate(d.getDate()+i);
    const ds = d.toISOString().slice(0,10);
    dayDates.push(ds);
    const isToday = ds === today;
    dayHeaders += `<div class="gantt-day${isToday?' today':''}">${DAYS[d.getDay()]}<br>${d.getDate()}</div>`;
  }

  // Today column index
  const todayIdx = dayDates.indexOf(today);

  // Build rows
  const sorted = [...withDates].sort((a,b) => a.start.localeCompare(b.start));
  let rows = '';
  sorted.forEach(t => {
    const startIdx = dayDates.indexOf(t.start);
    const endIdx = dayDates.indexOf(t.end);
    if (startIdx < 0 || endIdx < 0) return;
    const pct = (i) => (i / totalDays * 100).toFixed(2) + '%';
    const width = ((endIdx - startIdx + 1) / totalDays * 100).toFixed(2) + '%';

    // cells
    let cells = '';
    for (let i=0;i<totalDays;i++) {
      cells += `<div class="gantt-cell${i===todayIdx?' today-col':''}"></div>`;
    }

    rows += `<div class="gantt-row">
      <div class="gantt-label" title="${escHtml(t.name)}">${escHtml(t.name)}</div>
      <div class="gantt-grid">
        ${cells}
        <div class="gantt-bar-wrap">
          ${todayIdx>=0?`<div class="today-line" style="left:${pct(todayIdx)}"></div>`:''}
          <div class="gantt-bar ${t.pri}" style="left:${pct(startIdx)};width:${width};">${escHtml(t.name)}</div>
        </div>
      </div>
    </div>`;
  });

  body.innerHTML = `<div class="gantt-wrap">
    <div class="gantt-header">${dayHeaders}</div>
    ${rows}
  </div>`;
}

// ── Modal helpers ───────────────────────────────────────
function openAddModal() {
  editId = null;
  formSel = { pri:'medium', status:'upcoming' };
  document.getElementById('modal-title').textContent = 'Add Trade';
  document.getElementById('f-name').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-start').value = todayStr();
  document.getElementById('f-end').value = '';
  document.getElementById('f-notes').value = '';
  updateSegUI();
  document.getElementById('modal-bg').classList.remove('hidden');
}

function openEditModal(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;
  editId = id;
  formSel = { pri: t.pri, status: t.status };
  document.getElementById('modal-title').textContent = 'Edit Trade';
  document.getElementById('f-name').value = t.name;
  document.getElementById('f-company').value = t.company || '';
  document.getElementById('f-start').value = t.start || '';
  document.getElementById('f-end').value = t.end || '';
  document.getElementById('f-notes').value = t.notes || '';
  updateSegUI();
  document.getElementById('modal-bg').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal-bg').classList.add('hidden'); }
function closeModalBg(e) { if (e.target.id === 'modal-bg') closeModal(); }

function selSeg(type, val) {
  formSel[type] = val;
  updateSegUI();
}

function updateSegUI() {
  ['high','medium','low'].forEach(v => {
    const el = document.querySelector(`#seg-pri [data-val="${v}"]`);
    if (el) el.className = 'seg-opt' + (formSel.pri===v ? ` sel-${v}` : '');
  });
  ['onsite','upcoming'].forEach(v => {
    const el = document.querySelector(`#seg-status [data-val="${v}"]`);
    if (el) el.className = 'seg-opt' + (formSel.status===v ? ` sel-${v}` : '');
  });
}

function saveTrade() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').style.borderColor='var(--red)'; return; }
  document.getElementById('f-name').style.borderColor='';
  const t = {
    id: editId || uid(),
    name,
    company: document.getElementById('f-company').value.trim(),
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    pri: formSel.pri,
    status: formSel.status,
    notes: document.getElementById('f-notes').value.trim(),
    updated: Date.now()
  };
  if (editId) {
    const idx = trades.findIndex(x => x.id === editId);
    if (idx >= 0) trades[idx] = t;
  } else {
    trades.push(t);
  }
  save();
  closeModal();
  render();
}

function toggleStatus(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === 'onsite' ? 'upcoming' : 'onsite';
  save(); render();
}

function confirmDelete(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;
  document.getElementById('confirm-title').textContent = 'Remove Trade?';
  document.getElementById('confirm-msg').textContent = `"${t.name}" will be permanently removed from the programme.`;
  document.getElementById('confirm-ok').onclick = () => { deleteTrade(id); closeConfirm(); };
  document.getElementById('confirm-bg').classList.remove('hidden');
}

function deleteTrade(id) {
  trades = trades.filter(x => x.id !== id);
  save(); render();
}

function showClearConfirm() {
  document.getElementById('confirm-title').textContent = 'Clear All Trades?';
  document.getElementById('confirm-msg').textContent = 'This will permanently delete all trades from the programme. This cannot be undone.';
  document.getElementById('confirm-ok').onclick = () => { trades=[]; save(); render(); closeConfirm(); };
  document.getElementById('confirm-bg').classList.remove('hidden');
}

function closeConfirm() { document.getElementById('confirm-bg').classList.add('hidden'); }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-list').className = 'tab' + (tab==='list'?' active':'');
  document.getElementById('tab-gantt').className = 'tab' + (tab==='gantt'?' active':'');
  document.getElementById('fab').style.display = tab==='list' ? 'flex' : 'none';
  render();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
